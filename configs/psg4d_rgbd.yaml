# PSG4D RGB-D configuration
# Based on paper: PSG4DFormer with RGB-D input

dataset: psg4d
data_root: data/psg4d/psg4d_gta  # or psg4d_hoi
split_name: gta  # 'gta' or 'hoi'
modality: rgbd

# Model
input_dim: 256
hidden_dim: 256
num_relation_classes: 43  # GTA: 43, HOI: 15
num_entity_classes: 35    # GTA: 35, HOI: 46
tube_encoder_type: convolution
num_encoder_layers: 2
num_heads: 4
dropout: 0.1
max_tube_length: 64

# Training - Relation classifier (from paper: 100 epochs for PSG4D)
optimizer: adam
learning_rate: 0.001
weight_decay: 0.0
gradient_clip_norm: 0.0
num_epochs: 100
batch_size: 32
num_frames: 16
pad_length: 32

# Contrastive learning
use_contrastive: true
weight_relation_ce: 1.0
weight_shuffle_contrastive: 1.0
weight_triplet_contrastive: 1.0
similarity_method: optimal_transport
alpha: 10.0
gamma: 9.0
sinkhorn_iterations: 1000
sinkhorn_tau: 0.05

# Saving
save_dir: checkpoints/psg4d_rgbd
save_every: 10
seed: 42

# Segmentation fine-tuning reference (12 epochs for RGB-D)
