# OpenPVSG configuration
# Based on paper: IPS+T/VPS segmentation + relation classification

dataset: openpvsg
data_root: data/openpvsg

# Model
input_dim: 256
hidden_dim: 256
num_relation_classes: 57
num_entity_classes: 133
tube_encoder_type: convolution  # 'convolution' or 'transformer'
num_encoder_layers: 2
num_heads: 4
dropout: 0.1
max_tube_length: 64

# Training - Relation classifier (from paper)
optimizer: adam
learning_rate: 0.001
weight_decay: 0.0
gradient_clip_norm: 0.0
num_epochs: 50
batch_size: 32
num_frames: 16
pad_length: 32

# Contrastive learning
use_contrastive: true
weight_relation_ce: 1.0
weight_shuffle_contrastive: 1.0
weight_triplet_contrastive: 1.0
similarity_method: optimal_transport
alpha: 10.0
gamma: 9.0
sinkhorn_iterations: 1000
sinkhorn_tau: 0.05

# Saving
save_dir: checkpoints/openpvsg
save_every: 5
seed: 42

